apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "semaphore-ui.fullname" . }}-semaphore
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "semaphore-ui.semaphore.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.semaphore.replicaCount }}
  # BoltDB is single-writer; Recreate prevents split-brain on updates
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "semaphore-ui.semaphore.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "semaphore-ui.semaphore.selectorLabels" . | nindent 8 }}
      {{- with .Values.semaphore.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "semaphore-ui.serviceAccountName" . }}
      {{- with .Values.semaphore.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: semaphore
          image: "{{ .Values.semaphore.image.repository }}:{{ .Values.semaphore.image.tag }}"
          imagePullPolicy: {{ .Values.semaphore.image.pullPolicy }}
          {{- with .Values.semaphore.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.semaphore.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "semaphore-ui.fullname" . }}-semaphore-config
          env:
            - name: SEMAPHORE_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_ADMIN
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_ADMIN_PASSWORD
            - name: SEMAPHORE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_ADMIN_EMAIL
            - name: SEMAPHORE_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_ADMIN_NAME
            - name: SEMAPHORE_COOKIE_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_COOKIE_HASH
            - name: SEMAPHORE_COOKIE_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_COOKIE_ENCRYPTION
            - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: {{ include "semaphore-ui.fullname" . }}-semaphore-secret
                  key: SEMAPHORE_ACCESS_KEY_ENCRYPTION
            {{- with .Values.semaphore.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.semaphore.persistence.mountPath }}
            - name: tmp
              mountPath: /tmp/semaphore
          livenessProbe:
            httpGet:
              path: {{ .Values.global.basePath }}/api/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.global.basePath }}/api/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.semaphore.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.semaphore.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "semaphore-ui.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.semaphore.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.semaphore.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.semaphore.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
